name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-trigger from the Actions tab

# Needed by semantic-release to push the version commit + create the GitHub release
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write   # npm provenance

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout (full history for semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump commit can trigger downstream workflows.
          # Falls back to GITHUB_TOKEN if the secret is absent (version commit
          # won't re-trigger CI, but release itself still works fine).
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run types:check

      # Only publish for fix/feat/BREAKING CHANGE commits
      - name: Release
        if: |
          startsWith(github.event.head_commit.message, 'fix') ||
          startsWith(github.event.head_commit.message, 'feat') ||
          contains(github.event.head_commit.message, 'BREAKING CHANGE')
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
